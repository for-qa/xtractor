version: '3.8'

services:
  xtractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtractor-app
    restart: unless-stopped
    ports:
      - "8105:${PORT:-8105}"
    volumes:
      # Persistent volume for all runtime data: SQLite DB, staged S3 files, reports, and logs
      - ./output:/app/output
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8105}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
